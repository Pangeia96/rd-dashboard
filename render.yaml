# render.yaml — Configuração de deploy no Render.com
# Este arquivo define o serviço de backend FastAPI

services:
  - type: web
    name: rd-dashboard-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: RD_CLIENT_ID
        sync: false
      - key: RD_CLIENT_SECRET
        sync: false
      - key: RD_REDIRECT_URI
        sync: false
      - key: NUVEMSHOP_USER_ID
        sync: false
      - key: NUVEMSHOP_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DEFAULT_DATE_FROM
        value: "2025-09-01"
